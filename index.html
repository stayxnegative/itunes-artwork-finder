<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Artwork Finder</title>
    <style type="text/css">
body {
  font-family: Helvetica, Arial, sans-serif;
  background: #000000;
  color: #fff;
}
}

#corner {
  font-size: 8pt;
  position: absolute;
  top: 1em;
  left: 1em;
}

#searchForm {
  max-width: 50em;
  margin: 3em auto;
  padding: 0 3em;
}

#searchForm input {
  -webkit-appearance: none;
  outline: none;
  box-sizing: border-box;
  font-size: 18pt;
  margin: 0;
  padding: 0.5em;
  border: 2px solid #8b8b8b;
  font-weight: bold;
  background: #000;
  color: #fff;
}

#searchForm input[name=term] {
  width: 80%;
  border-right: 0;
  border-radius: 0.5em 0 0 0.5em;
}

#searchForm input[type=submit] {
  width: 20%;
  border-left: 0;
  background: #3a3a3a;
  color: #ffffff;
  border-radius: 0 0.5em 0.5em 0;
}

#searchForm input[type=submit]:active {
  background: #0b0b0b;
  color: #828282;
}

#options {
  display: flex;
  margin-top: 3em;
  justify-content: flex-end;
  font-size: 10pt;
}

#options select {
  width: 20em;
}

#results {
  margin: 3em;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.result {
  flex-basis: 10%;
  box-sizing: border-box;
  padding: 0.5em;
  overflow: hidden;
  /* box-shadow moved to hover */
}

@media(max-width: 1000px) {
  .result {
    flex-basis: 33.3%;
  }
}

@media(max-width: 600px) {
  .result {
    flex-basis: 100%;
  }
}

.result h2 {
  font-size: 10pt;
}

.result .artwork {
  position: relative;
  width: 100%;
  padding-bottom: 100%;
}

.result .artwork img {
  display: block;
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: #f0f0f0;
}

.result .links {
  position: absolute;
  bottom: 0;
  visibility: hidden;
  font-size: 8pt;
}

.result:hover .links {
  visibility: visible;
}

.result:hover {
  box-shadow: 0 4px 24px 0 rgba(255,255,255,0.15);
}

.result .links a {
  display: block;
  float: left;
  padding: 0.5em;
  color: #fff;
  background: #333;
  font-weight: bold;
  text-decoration: none;
}

.result .links a:hover {
  background: #fff;
  color: #333;
}

#error, #progress {
  text-align: center;
  flex-basis: 100%;
  font-size: 24pt;
  font-weight: bold;
}

#error {
  color: #000;
}

#progress {
  color: #ddd;
}
    </style>
    <script type="text/javascript">
'use strict'

const countries = Object.freeze({
  us: 'United States of America'
})

const entities = Object.freeze({
  album: "Album",
})

function buildUrl(term, entity, country) {
  const urlSearchParams = new URLSearchParams()
  urlSearchParams.set('country', country)
  urlSearchParams.set('limit', 25)
  urlSearchParams.set('entity', entity);
  let baseUrl = 'https://itunes.apple.com/search';
  urlSearchParams.set('term', term);
  return `${baseUrl}?${urlSearchParams}`;
}

async function fetchResults(term, entity, country) {
  const url = buildUrl(term, entity, country)
  const response = await fetch(url)
  if (!response.ok) {
    console.log(response)
    return null
  }
  return response.json()
}

async function onload() {
  // Add clear button functionality for the input X button
  setTimeout(() => {
    const inputClearBtn = document.getElementById('inputClearBtn');
    const termInput = document.querySelector('input[name="term"]');
    if (inputClearBtn && termInput) {
      // Hide button initially if input is empty
      inputClearBtn.style.display = termInput.value ? 'block' : 'none';
      // Show/hide button on input
      termInput.addEventListener('input', function() {
        inputClearBtn.style.display = this.value ? 'block' : 'none';
      });
      inputClearBtn.onclick = function() {
        termInput.value = '';
        termInput.focus();
        inputClearBtn.style.display = 'none';
      };
    }
  }, 0);
  const searchParams = new URLSearchParams(window.location.search)
  const term = searchParams.get('term')
  const country = searchParams.get('country') || 'us'
  const entity = searchParams.get('entity') || 'album'

  document.body.innerHTML = `
    <form id="searchForm" method="GET">
      <div id="searchField" style="position:relative;">
        <h1 style="text-align:center;">Artwork Finder</h1>
  <input type="text" name="term" value="${term || ""}" placeholder="Enter search term here" style="padding-right:2em; position:relative;" />
  <button type="button" id="inputClearBtn" style="position:absolute; right:0.5em; top:50%; transform:translateY(-50%); background:none; border:none; color:#fff; font-size:1em; width:1em; height:1em; line-height:1em; padding:0; cursor:pointer;">&#10006;</button>
        <input type="submit" value="Search" />
      </div>
      <div id="options">
      </div>
    </form><div id="results"></div>`
  // Add clear button functionality for the input X button
  setTimeout(() => {
    const inputClearBtn = document.getElementById('inputClearBtn');
    const termInput = document.querySelector('input[name="term"]');
    if (inputClearBtn && termInput) {
      inputClearBtn.onclick = function() {
        termInput.value = '';
        termInput.focus();
      };
    }
  }, 0);

  if (term == null || term.length == 0) {
    return
  }

  const resultsDiv = document.getElementById('results')
  resultsDiv.innerHTML = `<div id="progress">Loading results...</div>`

  let error
  let results
  try {
    results = await fetchResults(term, entity, country)
    console.log(results)
  } catch(e) {
    error = e.message
    console.log(e)
  }

  if (results == null) {
    resultsDiv.innerHTML = `<div id="error"><p>Sorry, some error occured while loading the results...</p>${error !== null ? `<p>(${error})</p>` : ""}</div>`
  } else {
    const resultItems = results["results"]
    if (resultItems === null || !Array.isArray(resultItems) || resultItems.length === 0) {
      resultsDiv.innerHTML = `<div id="error">Sorry, no results.</div>`
    } else {
      resultsDiv.innerHTML = `${resultItems.map(result => {
        const artworkUrl100 = result["artworkUrl100"];
        // Helper to replace and clean up the URL
        function fixArtworkUrl(url, size) {
          let newUrl = url.replace('100x100', `${size}x${size}-999`);
          // Remove 'bb' before '.jpg' if present
          newUrl = newUrl.replace(/bb(?=\.jpg)/, '');
          // Ensure it ends with .jpg
          if (!newUrl.endsWith('.jpg')) {
            newUrl += '.jpg';
          }
          return newUrl;
        }
        const artworkUrl300 = fixArtworkUrl(artworkUrl100, 300);
        const artworkUrl600 = fixArtworkUrl(artworkUrl100, 600);
        const artworkUrl1200 = fixArtworkUrl(artworkUrl100, 1500);
        // Integrate custom regex for artworkUrl5000
        let artworkUrl5000 = fixArtworkUrl(artworkUrl100, 10000);
        artworkUrl5000 = artworkUrl5000.replace(
          /^https:\/\/.*?\.mzstatic\.com\/image\/thumb\/(.*)\/.*\.jpg$/,
          "https://a1.mzstatic.com/us/r1000/063/$1"
        );
        const title = entity === 'album' ? `${result['artistName']} - ${result['collectionName']}` : (result['collectionName'] || result['trackName']);
        return `<div class="result">
          <div class="artwork">
            <img src="${artworkUrl300}" />
            <div class="links">
              <a href="${artworkUrl600}" target="_blank">600</a>
              <a href="${artworkUrl1200}" target="_blank">1500</a>
              <a href="${artworkUrl5000}" target="_blank">HD</a>
            </div>
          </div>
          <h2>${title}</h2>
        </div>`;
      }).join('')}`
    }
  }
}
    </script>
  </head>
  <body onload="onload()"></body>
</html>
