<!DOCTYPE html>
<html lang="en">
  <head>
  <link rel="manifest" href="favicon/site.webmanifest">
  <link rel="icon" type="image/ico" href="favicon/favicon.ico">
  <link rel="apple-touch-icon" sizes="512x512" href="favicon/apple-touch-icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>iTunes Artwork Finder</title>
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Artwork Finder">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="modal.css">
  <link rel="stylesheet" href="loader.css">
  <link rel="stylesheet" href="cards.css">
  <link rel="stylesheet" href="buttons.css">
  <link rel="stylesheet" href="forms.css">
  <link rel="stylesheet" href="base.css">
  <link rel="preload" as="image" href="images/test_wallpaper.jpg">
  <script src="app.js" defer></script>


  </head>
  <body>
    <form id="searchForm">
      <div id="searchField">
        <h1 id="title">iTunes Artwork Finder</h1>
        <div class="input-row">
          <div id="inputWrapper">
            <input name="term" id="searchInput" type="text" placeholder="Search for albums, songs, movies, audiobooks, ebooks, or apps..." autocomplete="off">
            <button type="button" id="clearBtn">×</button>
          </div>
          <button type="submit" id="submitBtn">Search</button>
        </div>
      </div>
    </form>

    <div id="results"></div>

    <div id="artworkModal" style="display:none;">
      <div class="modal-content">
        <div class="modal-close">×</div>
        <img class="modal-artwork" src="" alt="">
        <div class="modal-title">
          <a href="" target="_blank"></a>
        </div>
        <div class="modal-links"></div>
      </div>
    </div>

    <footer class="site-footer">
      <span id="footer-year"></span> © Tyrrtech, Inc. All Rights Reserved
    </footer>
  </body>
</html>
