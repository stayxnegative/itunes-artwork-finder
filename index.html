<!DOCTYPE html>
<html lang="en">

  <style type="text/css">
body {
  font-family: Helvetica, Arial, sans-serif;
  background: url('images/background.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #fff;
}

#searchForm {
  max-width: 50em;
  margin: 3em auto;
  padding: 0 3em;
  border-radius: 0.75em;
  box-shadow: none;
  border: none;
  /* background: #181818; */
}

#searchField {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#searchField .input-row {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}

#searchField .input-row > div {
  position: relative;
  display: flex;
  align-items: center;
  width: 100%;
  max-width: 400px;
  border-radius: 0.75em;
  border: none;
}

#searchForm input {
  -webkit-appearance: none;
  appearance: none;
  outline: none;
  box-sizing: border-box;
  font-size: 18pt;
  margin: 0;
  padding: 0.5em;
  border: 3px groove #8b8b8b;
  font-weight: bold;
  background: #000;
  color: #fff;
  border-radius: 0.5em;
  box-shadow: inset 0 4px 24px 0 rgba(120,120,120,0.25);
}

#searchForm input[name=term] {
  width: 100%;
  min-width: 0;
}

#searchForm input[type=submit] {
  background: #3a3a3a;
  color: #ffffff;
  border-radius: 0.5em;
  border: 2px solid #8b8b8b;
  font-weight: bold;
  font-size: 18pt;
  padding: 0.5em 1.5em;
  transition: background 0.2s, color 0.2s;
  margin-left: 0.25em;
  margin-top: 0;
  width: auto;
}

#searchForm input[type=submit]:hover {
  background: #212121;
  color: #97f19d;
  cursor: pointer;
}

@media (min-width: 601px) and (max-width: 1024px) { /* iPad */
  .result {
    flex-basis: 48%;
    margin: 1em;
    padding: 1em;
  }
  .result h2 {
    font-size: 16pt;
  }
}

#results {
  margin: 3em;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.result {
  flex-basis: 10%;
  box-sizing: border-box;
  padding: 0.6em 0.4em 0.3em 0.4em;
  margin: 0.4em;
  overflow: hidden;
  border-radius: 0.3em;
  background: #1e1e1e;
  border: 1px outset #202020;
  transition: box-shadow 0.2s, transform 0.2s;
  cursor: pointer;
  min-height: 0;
  height: auto;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
}

.result.selected {
  box-shadow: 0px 12px 18px 0 rgba(200, 200, 200, 0.25), 0 8px 24px 0 rgba(40,40,40,0.35), inset 0 2px 12px 0 rgba(120,120,120,0.18);
  transform: translateY(-4px) scale(1.03);
  z-index: 1;
}

@media(max-width: 1000px) {
  .result {
    flex-basis: 33.3%;
  }
}

@media(max-width: 600px) {
  .result {
    flex-basis: 100%;
  }
}

.result h2 {
  font-size: 11pt;
  color: #fff;
  text-align: center;
  margin-top: 0.5em;
  margin-bottom: 0.3em;
  font-weight: bold;
}

.result h2 a {
  color: inherit;
  text-decoration: none;
  transition: color 0.2s, text-shadow 0.2s;
}

.result h2 a:hover {
  color: #b0b0b0;
  text-shadow: 2px 4px 8px #000000;
}

.result .artwork {
  position: relative;
  width: 100%;
  padding-bottom: 100%;
}

.result .artwork img {
  display: block;
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: #f0f0f0;
}

.result .links {
  position: static;
  margin-top: 4px;
  text-align: center;
  font-size: 8pt;
  visibility: visible;
  margin-bottom: 0.1em;
}

.result:hover {
  box-shadow: 0px 8px 10px 0 rgba(200, 200, 200, 0.15);
  transform: translateY(-4px) scale(1.03);
}

.result .links a {
  display: inline-block;
  float: none;
  padding: 0.45em 0.8em;
  color: #000000;
  font-weight: bold;
  text-decoration: none;
  border: 2px groove #464646;
  font-size: 0.95em;
}

.result .links a:nth-child(1) {
  background: #97f19d;
}

.result .links a:nth-child(2) {
  background: #f1e697;
}

.result .links a:nth-child(3) {
  background: #97c6f1;
}

.result .links a:nth-child(4) {
  background: #f1a3a3;
}

.result .links a:nth-child(4):hover {
  background: #b33a3a;
  color: #ffffff;
}


.result .links a:nth-child(1):hover {
  background: #4e9c5a;
  color: #ffffff;
}

.result .links a:nth-child(2):hover {
  background: #b3a21a;
  color: #ffffff;
}


.result .links a:nth-child(3):hover {
  background: #1a4ab3;
  color: #ffffff;
}

.result .links a:hover {
  background: #212121;
  color: #ffffff;
}

/* Audiobook buttons: 3000 and HD */
.result.audiobook .links a:nth-child(1) {
  background: #e6baff;
}
.result.audiobook .links a:nth-child(2) {
  background: #baffd6;
}
.result.audiobook .links a:nth-child(1):hover {
  background: #a36ad6;
  color: #fff;
}
.result.audiobook .links a:nth-child(2):hover {
  background: #1ad68b;
  color: #fff;
}

/* Ebook buttons: 2200 and HD */
.result.ebook .links a:nth-child(1) {
  background: #ffe6ba;
}
.result.ebook .links a:nth-child(2) {
  background: #bae6ff;
}
.result.ebook .links a:nth-child(1):hover {
  background: #d6a36a;
  color: #fff;
}
.result.ebook .links a:nth-child(2):hover {
  background: #6ad6a3;
  color: #fff;
}

#error, #progress {
  text-align: center;
  flex-basis: 100%;
  font-size: 24pt;
  font-weight: bold;
}

#error {
  color: #000;
}

#progress {
  color: #ddd;
}

/* Move all mobile-specific styles to the end for higher specificity */

    max-width: 100vw !important;

  }
  #searchForm input[name=term] {

  }

  }
  .result {

    margin: 1em auto !important;

  }
  .result .artwork {
    width: 100% !important;
    padding-bottom: 100% !important;
    position: relative !important;
  }
  .result .artwork img {
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    object-fit: contain !important;
    background: #f0f0f0 !important;
  }
}
@media only screen and (max-width: 430px) {
  #results {
    margin: 0.1em !important;
  }
  .result {
    width: 96vw !important;
    max-width: 260px !important;
    margin: 0.8em auto !important;
    padding: 0.2em 0.05em !important;
    min-width: 0 !important;
  }
  .result .artwork {
    width: 100% !important;
    padding-bottom: 100% !important;
    position: relative !important;
  }
  .result .artwork img {
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    object-fit: contain !important;
    background: #f0f0f0 !important;
  }
}

#title {
  margin-bottom: 0.5em;
  font-size: 1.7em;
}

    </style>
    <script type="text/javascript">
'use strict'

// countries object removed, not used

// entities object removed, not used

function buildUrl(term, entity, country) {
  const urlSearchParams = new URLSearchParams()
  urlSearchParams.set('country', country)
  urlSearchParams.set('limit', 50)
  urlSearchParams.set('entity', entity);
  if (typeof window !== 'undefined' && window.attribute && window.attribute.length > 0) {
    urlSearchParams.set('attribute', window.attribute);
  }
  let baseUrl = 'https://itunes.apple.com/search';
  urlSearchParams.set('term', term);
  return `${baseUrl}?${urlSearchParams}`;
}

async function fetchResults(term, entity, country) {
  const url = buildUrl(term, entity, country)
  const response = await fetch(url)
  if (!response.ok) {
    console.log(response)
    return null
  }
  return response.json()
}

async function onload() {
  const searchParams = new URLSearchParams(window.location.search);
  const term = searchParams.get('term');
  const country = searchParams.get('country') || 'us';
  let entity = 'album';
  let attribute = '';
  let searchTerm = term;
  let countryCode = country;
  let usePng = false;
  if (term && term.toLowerCase().includes('.png')) {
    usePng = true;
    searchTerm = searchTerm.replace(/\.png/gi, '').trim();
  }
  // Map attribute prefixes to iTunes API attributes and their default entities
  const attributeEntityMap = {
  'artist:': { entity: 'album', attribute: 'artistTerm' },
  'title:': { entity: 'album', attribute: 'titleTerm' },
  'author:': { entity: 'audiobook', attribute: 'authorTerm' }
  };
  // Map entity prefixes to iTunes API entities
  const entityMap = {
  'album:': 'album',
  'song:': 'song',
  'audiobook:': 'audiobook',
  'ebook:': 'ebook'
  };
  // Map country code prefixes
  const countryMap = {
  'uk:': 'gb',
  'us:': 'us',
  'ca:': 'ca',
  'au:': 'au',
  'fr:': 'fr',
  'de:': 'de',
  'jp:': 'jp',
  'it:': 'it',
  'es:': 'es',
  'nl:': 'nl',
  'br:': 'br',
  'mx:': 'mx',
  'ru:': 'ru',
  'se:': 'se',
  'cn:': 'cn',
  'kr:': 'kr',
  'in:': 'in',
  'za:': 'za'
  };
  if (term) {
    let lowerTerm = term.toLowerCase();
    let entityFound = false;
    // Check for country prefix
    for (const countryPrefix in countryMap) {
      if (lowerTerm.startsWith(countryPrefix)) {
        countryCode = countryMap[countryPrefix];
        searchTerm = term.replace(new RegExp('^' + countryPrefix, 'i'), '').trim();
        lowerTerm = searchTerm.toLowerCase();
        break;
      }
    }
    // Check for entity prefix
    for (const entityPrefix in entityMap) {
      if (lowerTerm.startsWith(entityPrefix)) {
        entity = entityMap[entityPrefix];
        searchTerm = searchTerm.replace(new RegExp('^' + entityPrefix, 'i'), '').trim();
        lowerTerm = searchTerm.toLowerCase();
        entityFound = true;
        break;
      }
    }
    // If no entity prefix, check for attribute prefix and map to default entity
    if (!entityFound) {
      for (const attrPrefix in attributeEntityMap) {
        if (lowerTerm.startsWith(attrPrefix)) {
          entity = attributeEntityMap[attrPrefix].entity;
          attribute = attributeEntityMap[attrPrefix].attribute;
          searchTerm = searchTerm.replace(new RegExp('^' + attrPrefix, 'i'), '').trim();
          break;
        }
      }
    }
  }

  document.body.innerHTML = `
  <header class="site-header"></header>
  <div class="site-logo"></div>
  <form id="searchForm" method="GET">
      <div id="searchField">
        <h1 id="title" style="text-align:center;cursor:pointer;">iTunes Artwork Finder</h1>
        <div class="input-row">
          <div>
            <input id="searchInput" type="text" name="term" value="${term || ""}" placeholder="Enter search term here" style="width:100%;padding-right:2em;" />
            <button id="clearBtn" type="button" style="position:absolute;right:0.3em;top:50%;transform:translateY(-50%);background:none;border:none;font-size:1.2em;cursor:pointer;line-height:1;color:#888;">&#10006;</button>
          </div>
          <input type="submit" value="Search" />
        </div>
      </div>
      <div id="options"></div>
    </form>
    <div id="results"></div>
  `;

  // Add clear button functionality
  const searchInput = document.getElementById('searchInput');
  const clearBtn = document.getElementById('clearBtn');
  if (clearBtn && searchInput) {
    clearBtn.addEventListener('click', function() {
      searchInput.value = "";
      searchInput.focus();
      clearBtn.style.display = "none";
    });
    function toggleClearBtn() {
      clearBtn.style.display = searchInput.value ? "block" : "none";
    }
    searchInput.addEventListener('input', toggleClearBtn);
    toggleClearBtn();
  }

  // Add click event to title to reload and clear form
  const titleEl = document.getElementById('title');
  if (titleEl) {
    titleEl.addEventListener('click', function() {
      window.location.href = window.location.pathname;
    });
  }

  if (term == null || term.length == 0) {
    return
  }

  const resultsDiv = document.getElementById('results')
  resultsDiv.innerHTML = `<div id="progress">Loading results...</div>`

  let error
  let results
  window.attribute = attribute;
  try {
    results = await fetchResults(searchTerm, entity, countryCode)
    console.log(results)
  } catch(e) {
    error = e.message
    console.log(e)
  }

  if (results == null) {
    resultsDiv.innerHTML = `<div id="error"><p>Sorry, some error occured while loading the results...</p>${error !== null ? `<p>(${error})</p>` : ""}</div>`
  } else {
    const resultItems = results["results"]
    if (resultItems === null || !Array.isArray(resultItems) || resultItems.length === 0) {
      resultsDiv.innerHTML = `<div id="error">Sorry, no results.</div>`
    } else {
      resultsDiv.innerHTML = `${resultItems.map(result => {
        const artworkUrl100 = result["artworkUrl100"];
        // Helper to replace and clean up the URL
        function fixArtworkUrl(url, size) {
          let newUrl = url.replace('100x100', `${size}x${size}-999`);
          // Remove 'bb' before '.jpg' if present
          newUrl = newUrl.replace(/bb(?=\.jpg)/, '');
          // Ensure it ends with .jpg
          if (!newUrl.endsWith('.jpg')) {
            newUrl += '.jpg';
          }
          // If .png search parameter is used, convert .jpg to .png
          if (usePng) {
            newUrl = newUrl.replace(/\.jpg$/, '.png');
          }
          return newUrl;
        }
        const artworkUrl300 = fixArtworkUrl(artworkUrl100, 300);
        const artworkUrl600 = fixArtworkUrl(artworkUrl100, 600);
        const artworkUrl1500 = fixArtworkUrl(artworkUrl100, 1500);
        const artworkUrl3000 = fixArtworkUrl(artworkUrl100, 3000);
        // Integrate custom regex for artworkUrl5000
        let artworkUrl5000 = fixArtworkUrl(artworkUrl100, 10000);
        artworkUrl5000 = artworkUrl5000.replace(
          /^https:\/\/.*?\.mzstatic\.com\/image\/thumb\/(.*)\/.*\.(jpg|png)$/,
          "https://a1.mzstatic.com/us/r1000/063/$1"
        );
        // Always use .jpg for artworkUrl5000
        artworkUrl5000 = artworkUrl5000.replace(/\.png$/, '.jpg');
        // For ebooks, create a new artworkUrl1467x2200
        let artworkUrl1467x2200 = '';
        if (entity === 'ebook') {
          artworkUrl1467x2200 = artworkUrl100.replace('100x100', '1467x2200');
          artworkUrl1467x2200 = artworkUrl1467x2200.replace(/bb(?=\.jpg)/, '');
          // Ensure -999 before .jpg
          artworkUrl1467x2200 = artworkUrl1467x2200.replace(/(1467x2200)(?!-999)(?=\.jpg)/, '$1-999');
          // If .jpg is missing, add -999.jpg
          if (!artworkUrl1467x2200.endsWith('.jpg')) {
            if (!/-999$/.test(artworkUrl1467x2200)) {
              artworkUrl1467x2200 += '-999';
            }
            artworkUrl1467x2200 += '.jpg';
          }
          if (usePng) {
            artworkUrl1467x2200 = artworkUrl1467x2200.replace(/\.jpg$/, '.png');
          }
        }
        // Get release year
        let year = '';
        if (result['releaseDate']) {
          const d = new Date(result['releaseDate']);
          if (!isNaN(d.getFullYear())) {
            year = ` (${d.getFullYear()})`;
          }
        }
        let displayTitle = result['collectionName'];
        if (entity === 'album') {
          if (/\bEP\b/i.test(result['collectionName'])) {
            displayTitle = displayTitle.replace(/\s*-?\s*EP\b/i, '').trim();
            displayTitle += ' [EP]';
          } else if (/\bSingle\b/i.test(result['collectionName'])) {
            displayTitle = displayTitle.replace(/\s*-?\s*Single\b/i, '').trim();
            displayTitle += ' [Single]';
          }
        }
        const title = entity === 'album' ? `${result['artistName']} - ${displayTitle}${year}` : (result['collectionName'] || result['trackName']);
        let viewUrl = result['collectionViewUrl'] || result['trackViewUrl'] || result['artistViewUrl'] || result['viewUrl'] || '#';
        let linksHtml = '';
        if (entity === 'audiobook') {
          linksHtml = `
            <a href="${artworkUrl3000}" target="_blank">3000</a>
            <a href="${artworkUrl5000}" target="_blank">HD</a>
          `;
        } else if (entity === 'ebook') {
          linksHtml = `
            <a href="${artworkUrl1467x2200}" target="_blank">2200</a>
            <a href="${artworkUrl5000}" target="_blank">HD</a>
          `;
        } else {
          linksHtml = `
            <a href="${artworkUrl600}" target="_blank">600</a>
            <a href="${artworkUrl1500}" target="_blank">1500</a>
            <a href="${artworkUrl3000}" target="_blank">3000</a>
            <a href="${artworkUrl5000}" target="_blank">HD</a>
          `;
        }
        return `<div class="result${entity === 'audiobook' ? ' audiobook' : (entity === 'ebook' ? ' ebook' : '')}">
          <div class="artwork">
            <img src="${artworkUrl300}" />
          </div>
          <div class="links">
            ${linksHtml}
          </div>
          <h2><a href="${viewUrl}" target="_blank">${title}</a></h2>
        </div>`;
      }).join('')}`
      handleCardSelection();
    }
  }
}

// Add JS to handle album card selection
function handleCardSelection() {
  document.querySelectorAll('.result').forEach(card => {
    card.addEventListener('click', function() {
      document.querySelectorAll('.result.selected').forEach(sel => sel.classList.remove('selected'));
      card.classList.add('selected');
    });
  });
}
    </script>
  </head>
  <body onload="onload()"></body>
</html>
