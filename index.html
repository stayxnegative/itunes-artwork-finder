<!DOCTYPE html>
<html lang="en">
  <head>
  <link rel="manifest" href="images/site.manifest">
  <link rel="apple-touch-icon" sizes="512x512" href="images/apple-touch-icon-512.png">
  <link rel="icon" type="image/png" href="images/favicon.ico">
  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.8, minimum-scale=0.5, maximum-scale=2.0">
  <meta http-equiv="Content-Language" content="en">
    <title>Artwork Finder</title>
    <style type="text/css">
body {
  font-family: Helvetica, Arial, sans-serif;
  background: #000000;
  color: #fff;
}

#searchForm {
  max-width: 50em;
  margin: 3em auto;
  padding: 0 3em;
  border-radius: 0.75em;
  box-shadow: inset 0 2px 12px 0 rgba(40,40,40,0.6);
  /* Remove background so title is not covered */
  /* background: #181818; */
}

#searchField {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#searchField .input-row {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}

#searchField .input-row > div {
  position: relative;
  display: flex;
  align-items: center;
  width: 100%;
  max-width: 400px;
}

#searchForm input {
  -webkit-appearance: none;
  outline: none;
  box-sizing: border-box;
  font-size: 18pt;
  margin: 0;
  padding: 0.5em;
  border: 2px solid #8b8b8b;
  font-weight: bold;
  background: #000;
  color: #fff;
}

#searchForm input[name=term] {
  width: 100%;
  min-width: 0;
}

#searchForm input[type=submit] {
  background: #3a3a3a;
  color: #ffffff;
  border-radius: 0.5em;
  border: 2px solid #8b8b8b;
  font-weight: bold;
  font-size: 18pt;
  padding: 0.5em 1.5em;
  transition: background 0.2s, color 0.2s;
  margin-left: 0.25em;
  margin-top: 0;
  width: auto;
}

#searchForm input[type=submit]:hover {
  background: #212121;
  color: #97f19d;
  cursor: pointer;
}

@media (max-width: 600px) {
  #searchField .input-row > div {
    max-width: 100%;
  }
  #searchForm input[name=term] {
    font-size: 16pt;
    padding: 0.5em;
  }
}

#results {
  margin: 3em;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.result {
  flex-basis: 10%;
  box-sizing: border-box;
  padding: 1em 0.75em 0.75em 0.75em;
  margin: 0.75em;
  overflow: hidden;
  border-radius: 1em;
  background: #181818;
  border: 0.75px solid #232323;
  transition: box-shadow 0.2s, transform 0.2s;
}

@media(max-width: 1000px) {
  .result {
    flex-basis: 33.3%;
  }
}

@media(max-width: 600px) {
  .result {
    flex-basis: 100%;
  }
}

.result h2 {
  font-size: 12pt;
  color: #fff;
  text-align: center;
  margin-top: 1em;
  margin-bottom: 0.5em;
  font-weight: bold;
}

.result .artwork {
  position: relative;
  width: 100%;
  padding-bottom: 100%;
}

.result .artwork img {
  display: block;
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: #f0f0f0;
}

.result .links {
  position: static;
  margin-top: 8px;
  text-align: center;
  font-size: 8pt;
  visibility: visible;
}

.result:hover .links {
  /* No longer needed, links always visible below artwork */
}

.result:hover {
  box-shadow: 0px 8px 10px 0 rgba(200, 200, 200, 0.15);
  transform: translateY(-4px) scale(1.03);
}

.result .links a {
  display: inline-block;
  float: none;
  padding: 0.6em 1em;
  color: #000000;
  font-weight: bold;
  text-decoration: none;
}

.result .links a:nth-child(1) {
  background: #97f19d;
}

.result .links a:nth-child(2) {
  background: #f1e697;
}

.result .links a:nth-child(3) {
  background: #97c6f1;
}

.result .links a:nth-child(4) {
  background: #f1a3a3;
}

.result .links a:nth-child(4):hover {
  background: #b33a3a;
  color: #ffffff;
}


.result .links a:nth-child(1):hover {
  background: #4e9c5a;
  color: #ffffff;
}

.result .links a:nth-child(2):hover {
  background: #b3a21a;
  color: #ffffff;
}


.result .links a:nth-child(3):hover {
  background: #1a4ab3;
  color: #ffffff;
}

.result .links a:hover {
  background: #212121;
  color: #ffffff;
}

#error, #progress {
  text-align: center;
  flex-basis: 100%;
  font-size: 24pt;
  font-weight: bold;
}

#error {
  color: #000;
}

#progress {
  color: #ddd;
}
  </style>
    <script type="text/javascript">
'use strict'

// countries object removed, not used

// entities object removed, not used

function buildUrl(term, entity, country) {
  const urlSearchParams = new URLSearchParams()
  urlSearchParams.set('country', country)
  urlSearchParams.set('limit', 40)
  urlSearchParams.set('entity', entity);
  let baseUrl = 'https://itunes.apple.com/search';
  urlSearchParams.set('term', term);
  return `${baseUrl}?${urlSearchParams}`;
}

async function fetchResults(term, entity, country) {
  const url = buildUrl(term, entity, country)
  const response = await fetch(url)
  if (!response.ok) {
    console.log(response)
    return null
  }
  return response.json()
}

async function onload() {
  const searchParams = new URLSearchParams(window.location.search);
  const term = searchParams.get('term');
  const country = searchParams.get('country') || 'us';
  const entity = searchParams.get('entity') || 'album';

  document.body.innerHTML = `
    <form id="searchForm" method="GET">
      <div id="searchField">
        <h1 id="title" style="text-align:center;cursor:pointer;">Artwork Finder</h1>
        <div class="input-row">
          <div>
            <input id="searchInput" type="text" name="term" value="${term || ""}" placeholder="Enter search term here" style="width:100%;padding-right:2em;" />
            <button id="clearBtn" type="button" style="position:absolute;right:0.3em;top:50%;transform:translateY(-50%);background:none;border:none;font-size:1.2em;cursor:pointer;line-height:1;color:#888;">&#10006;</button>
          </div>
          <input type="submit" value="Search" />
        </div>
      </div>
      <div id="options"></div>
    </form>
    <div id="results"></div>
  `;

  // Add clear button functionality
  const searchInput = document.getElementById('searchInput');
  const clearBtn = document.getElementById('clearBtn');
  if (clearBtn && searchInput) {
    clearBtn.addEventListener('click', function() {
      searchInput.value = "";
      searchInput.focus();
      clearBtn.style.display = "none";
    });
    function toggleClearBtn() {
      clearBtn.style.display = searchInput.value ? "block" : "none";
    }
    searchInput.addEventListener('input', toggleClearBtn);
    toggleClearBtn();
  }

  // Add click event to title to reload and clear form
  const titleEl = document.getElementById('title');
  if (titleEl) {
    titleEl.addEventListener('click', function() {
      window.location.href = window.location.pathname;
    });
  }

  if (term == null || term.length == 0) {
    return
  }

  const resultsDiv = document.getElementById('results')
  resultsDiv.innerHTML = `<div id="progress">Loading results...</div>`

  let error
  let results
  try {
    results = await fetchResults(term, entity, country)
    console.log(results)
  } catch(e) {
    error = e.message
    console.log(e)
  }

  if (results == null) {
    resultsDiv.innerHTML = `<div id="error"><p>Sorry, some error occured while loading the results...</p>${error !== null ? `<p>(${error})</p>` : ""}</div>`
  } else {
    const resultItems = results["results"]
    if (resultItems === null || !Array.isArray(resultItems) || resultItems.length === 0) {
      resultsDiv.innerHTML = `<div id="error">Sorry, no results.</div>`
    } else {
      resultsDiv.innerHTML = `${resultItems.map(result => {
        const artworkUrl100 = result["artworkUrl100"];
        // Helper to replace and clean up the URL
        function fixArtworkUrl(url, size) {
          let newUrl = url.replace('100x100', `${size}x${size}-999`);
          // Remove 'bb' before '.jpg' if present
          newUrl = newUrl.replace(/bb(?=\.jpg)/, '');
          // Ensure it ends with .jpg
          if (!newUrl.endsWith('.jpg')) {
            newUrl += '.jpg';
          }
          return newUrl;
        }
        const artworkUrl300 = fixArtworkUrl(artworkUrl100, 300);
        const artworkUrl600 = fixArtworkUrl(artworkUrl100, 600);
        const artworkUrl1500 = fixArtworkUrl(artworkUrl100, 1500);
        const artworkUrl3000 = fixArtworkUrl(artworkUrl100, 3000);
        // Integrate custom regex for artworkUrl5000
        let artworkUrl5000 = fixArtworkUrl(artworkUrl100, 10000);
        artworkUrl5000 = artworkUrl5000.replace(
          /^https:\/\/.*?\.mzstatic\.com\/image\/thumb\/(.*)\/.*\.jpg$/,
          "https://a1.mzstatic.com/us/r1000/063/$1"
        );
        // Get release year
        let year = '';
        if (result['releaseDate']) {
          const d = new Date(result['releaseDate']);
          if (!isNaN(d.getFullYear())) {
            year = ` (${d.getFullYear()})`;
          }
        }
        const title = entity === 'album' ? `${result['artistName']} - ${result['collectionName']}${year}` : (result['collectionName'] || result['trackName']);
        return `<div class="result">
          <div class="artwork">
            <img src="${artworkUrl300}" />
          </div>
          <div class="links">
            <a href="${artworkUrl600}" target="_blank">600</a>
            <a href="${artworkUrl1500}" target="_blank">1500</a>
            <a href="${artworkUrl3000}" target="_blank">3000</a>
            <a href="${artworkUrl5000}" target="_blank">HD</a>
          </div>
          <h2>${title}</h2>
        </div>`;
      }).join('')}`
    }
  }
}
    </script>
  </head>
  <body onload="onload()"></body>
</html>
